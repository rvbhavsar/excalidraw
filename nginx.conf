server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets never change — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The service worker and its registration must always be revalidated, or the
    # browser keeps serving a cached sw.js, never detects a new deploy, and users
    # stay stuck on an old bundle. Same for the app shell (index.html).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA client-side routes (/dashboard, /d/:id, ...) fall back to the app
    # shell; keep it uncached so a new deploy is picked up on the next load.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
