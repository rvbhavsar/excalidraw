server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routes (/dashboard, /d/:id, ...) must fall back to the
    # app shell — nginx would otherwise 404 any path without a matching file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
